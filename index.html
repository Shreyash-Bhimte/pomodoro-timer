<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>25:00 — Work</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍅</text></svg>" />
</head>

<body data-state="idle" data-mode="work">

  <div class="app-wrapper">

    <!-- ── MODE LABEL ── -->
    <p class="mode-label" id="modeLabel">Work</p>

    <!-- ── TIMER DISPLAY ── -->
    <div class="timer-display" id="timerDisplay">25:00</div>

    <!-- ── CONTROLS ── -->
    <div class="controls">
      <button class="btn btn-primary" id="startPauseBtn">Start</button>
      <button class="btn btn-secondary" id="resetBtn">Reset</button>
    </div>

    <!-- ── SESSION DOTS ── -->
    <div class="session-dots" id="sessionDots" aria-label="Pomodoros completed">
      <span class="dot" data-index="0"></span>
      <span class="dot" data-index="1"></span>
      <span class="dot" data-index="2"></span>
      <span class="dot" data-index="3"></span>
    </div>

    <!-- ── SETTINGS PANEL ── -->
    <details class="settings-panel" id="settingsPanel">
      <summary class="settings-toggle">Settings</summary>

      <div class="settings-grid">
        <label>
          Work (min)
          <input type="number" id="workDuration" min="1" max="60" value="25" />
        </label>
        <label>
          Short break (min)
          <input type="number" id="shortBreakDuration" min="1" max="30" value="5" />
        </label>
        <label>
          Long break (min)
          <input type="number" id="longBreakDuration" min="1" max="60" value="15" />
        </label>
      </div>

      <button class="btn btn-secondary" id="applySettingsBtn">Apply</button>
    </details>

  </div><!-- /.app-wrapper -->

  <script src="app.js"></script>
</body>
</html>
